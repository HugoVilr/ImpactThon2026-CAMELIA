<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CAMELIA Frontend</title>
  </head>
  <body>
    <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" style="position: absolute; width: 0; height: 0; pointer-events: none;">
      <!-- Deuteranopia Correction (Shifts Green to Cyan) -->
      <filter id="daltonize-deuteranopia" color-interpolation-filters="sRGB">
        <feColorMatrix type="matrix" values="
          1.000  0.000  0.000  0.0  0.0
          0.000  0.500  0.500  0.0  0.0
          0.000  0.000  1.000  0.0  0.0
          0.000  0.000  0.000  1.0  0.0" />
      </filter>
      <!-- Protanopia Correction (Shifts Red to Magenta) -->
      <filter id="daltonize-protanopia" color-interpolation-filters="sRGB">
        <feColorMatrix type="matrix" values="
          0.500  0.000  0.500  0.0  0.0
          0.000  1.000  0.000  0.0  0.0
          0.000  0.000  1.000  0.0  0.0
          0.000  0.000  0.000  1.0  0.0" />
      </filter>
      <!-- Tritanopia Correction (Shifts Blue to Red) -->
      <filter id="daltonize-tritanopia" color-interpolation-filters="sRGB">
        <feColorMatrix type="matrix" values="
          1.000  0.000  0.000  0.0  0.0
          0.000  1.000  0.000  0.0  0.0
          0.500  0.500  0.000  0.0  0.0
          0.000  0.000  0.000  1.0  0.0" />
      </filter>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
