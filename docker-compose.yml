services:
  postgres:
    image: postgres:16-alpine
    container_name: camelia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: camelia
      POSTGRES_USER: camelia
      POSTGRES_PASSWORD: camelia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
