name: CI

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run frontend tests
        run: npm run test --workspace frontend

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Pipenv
        run: python -m pip install --upgrade pip pipenv

      - name: Install backend dependencies
        run: pipenv sync --dev

      - name: Run backend tests
        run: pipenv run test

  deploy-frontend:
    name: Deploy Frontend to Cloud Run
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: ${{ secrets.GCP_REGION }}
      SERVICE: ${{ secrets.GCP_FRONTEND_SERVICE }}
      REPOSITORY: ${{ secrets.GCP_ARTIFACT_REPOSITORY }}
      VITE_API_URL: ${{ vars.FRONTEND_VITE_API_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required deployment config
        run: |
          test -n "$PROJECT_ID" || (echo "Missing secret GCP_PROJECT_ID" && exit 1)
          test -n "$REGION" || (echo "Missing secret GCP_REGION" && exit 1)
          test -n "$SERVICE" || (echo "Missing secret GCP_FRONTEND_SERVICE" && exit 1)
          test -n "$REPOSITORY" || (echo "Missing secret GCP_ARTIFACT_REPOSITORY" && exit 1)

      - name: Validate GCP service account key secret
        if: ${{ secrets.GCP_SA_KEY == '' }}
        run: |
          echo "Missing secret GCP_SA_KEY"
          exit 1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe "$REPOSITORY" \
            --location "$REGION" >/dev/null 2>&1 || \
          gcloud artifacts repositories create "$REPOSITORY" \
            --repository-format=docker \
            --location "$REGION"

      - name: Build and push frontend image
        id: image
        run: |
          IMAGE_URI="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/frontend:${GITHUB_SHA}"
          if [ -n "$VITE_API_URL" ]; then
            docker build \
              --platform linux/amd64 \
              -f frontend/Dockerfile \
              --build-arg VITE_API_URL="$VITE_API_URL" \
              -t "$IMAGE_URI" \
              frontend
          else
            docker build \
              --platform linux/amd64 \
              -f frontend/Dockerfile \
              -t "$IMAGE_URI" \
              frontend
          fi
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --image "${{ steps.image.outputs.image_uri }}" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --port 80 \
            --quiet

      - name: Show deployed URL
        run: |
          gcloud run services describe "$SERVICE" \
            --region "$REGION" \
            --format='value(status.url)'
